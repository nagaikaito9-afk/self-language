<head>
    <meta charset="UTF-8">
    <title>My Original Language Game Engine</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #1e1e1e; color: #d4d4d4; }
        .toolbar { padding: 10px 20px; display: flex; gap: 15px; align-items: center; background-color: #2d2d30; border-bottom: 1px solid #3e3e42; }
        button { padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; background: #007acc; color: white; border: none; }
        button:hover { opacity: 0.8; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        #editor-container { flex: 1; display: flex; flex-direction: column; font-size: 16px; border: 1px solid #3e3e42; border-radius: 4px; }
        .CodeMirror { flex: 1; font-family: 'Consolas', monospace; border-radius: 4px; }
        
        #display-container { flex: 1; display: flex; flex-direction: column; background-color: #252526; border: 1px solid #3e3e42; border-radius: 4px; position: relative; overflow: hidden;}
        
        /* ★オートフォーカス！画面をクリックするか実行するとオレンジに光ります */
        #canvas-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 10px; outline: none; transition: 0.2s; border: 3px solid transparent; border-radius: 4px;}
        #canvas-wrapper:focus { border: 3px solid #ff9800; background-color: #2c2c2c; }
        
        canvas { background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.5); cursor: pointer; }
        #error-console { display: none; background-color: #3b0000; color: #ff6b6b; border-top: 2px solid #ff4c4c; padding: 10px; font-family: monospace; font-size: 14px; white-space: pre-wrap; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="btn-run" style="background: #28a745;">▶ 実行</button>
        <button onclick="showHelp()" style="background: #17a2b8;">❓ 使い方</button>
    </div>

    <div class="main-layout">
        <div id="editor-container">
            <textarea id="editor"></textarea>
        </div>

        <div id="display-container">
            <div id="canvas-wrapper" tabindex="0" onclick="this.focus()">
                <canvas id="game-canvas" width="0" height="0"></canvas>
            </div>
            <div id="error-console"></div>
        </div>
    </div>

    <script>
        window.editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "python", theme: "monokai", lineNumbers: true, indentUnit: 4, matchBrackets: true,
            extraKeys: { "Enter": "newlineAndIndent" }
        });
        
        // ★数字キーもテンキーも、プレイ中のエラーもすべて対応したサンプルです！
        window.editor.setValue(`screen(600, 400)
screen_color(BLACK)

print("info", "【1】か【テンキーの1】を押すと弾が発射されます！", (20, 30), 18, WHITE)
rect("player", (50, 180), (40, 40), BLUE)

# 普通の数字キー「1」が押されたとき
key(1):
    circle("bullet1", (100, 200), 10, YELLOW)
    move("bullet1", ((100, 200), (600, 200), 0.5), 1)
    wait(0.5)
    erase("bullet1")

# テンキーの「1」が押されたとき
key(TEN1):
    circle("bullet2", (100, 200), 10, RED)
    move("bullet2", ((100, 200), (600, 200), 0.2), 1)
    wait(0.2)
    erase("bullet2")

# 矢印キーで移動
key(UP):
    now_x = get_x("player")
    now_y = get_y("player")
    move("player", ((now_x, now_y), (now_x, now_y - 40), 0.1), 1)

key(DOWN):
    now_x = get_x("player")
    now_y = get_y("player")
    move("player", ((now_x, now_y), (now_x, now_y + 40), 0.1), 1)

# わざと存在しない名前を指定して、プレイ中にエラーを出してみるテスト（Aキーを押してみて！）
key(A):
    now_x = get_x("honzaisinai_namae") 
`);

        function showHelp() {
            const helpText = `【キーボードの使い方】\n\n① key(名前):\n指定したキーが押された時に動きます。\n\n【使えるキーの種類】\n・矢印: UP, DOWN, LEFT, RIGHT\n・文字: A, B, C など\n・数字キー: 1, 2, 3 など\n・テンキー: TEN1, TEN2, TENENTER など\n・その他: SPACE, ESC\n\n※「▶ 実行」を押すと自動で画面がオレンジ色に囲まれ、すぐにキー操作ができるようになります！`;
            alert(helpText);
        }

        window.getWrappedCode = function() {
            let code = window.editor.getValue();
            code = code.replace(/\bfun\b/g, "async def");
            code = code.replace(/\bRepeat\s*\((.*?)\)\s*:/g, "for _ in range($1):");
            code = code.replace(/\bwait\s*\(/g, "await wait(");
            
            // ★数字キーのエラーを防ぐため、裏側で「__key_K_」という安全な名前に変換
            code = code.replace(/\bkey\s*\(\s*([a-zA-Z0-9_]+)\s*\)\s*:/g, "async def __key_K_$1__():");
            return code;
        };
    </script>

    <script type="py">
        import sys
        import time
        import random
        import traceback
        import asyncio
        from pyscript import document, when, window
        from js import Audio
        from pyodide.code import eval_code_async

        canvas = document.getElementById("game-canvas")
        ctx = canvas.getContext("2d")
        error_el = document.getElementById("error-console")

        is_screen_ready = False
        current_run_id = 0
        has_error = False # ★プレイ中のエラーでゲームを止めるためのフラグ
        bg_color_canvas = "white"
        
        elements = {}
        animations = {}
        key_events = {}

        RED, YELLOW, BLUE, GREEN, BLACK, WHITE = "red", "yellow", "blue", "green", "black", "white"
        infinite = -1

        # ★プレイ中のエラーを確実にキャッチする魔法の関数
        async def safe_call(func):
            global has_error
            if has_error: return
            try:
                if asyncio.iscoroutinefunction(func):
                    await func()
                else:
                    func()
            except Exception:
                show_japanese_error()

        def screen(w, h):
            global is_screen_ready
            canvas.width = w
            canvas.height = h
            is_screen_ready = True

        def screen_color(color):
            global bg_color_canvas
            bg_color_canvas = color

        def custom_print(name, text, pos, size, color):
            elements[name] = {"type": "text", "text": text, "x": pos[0], "y": pos[1], "size": size, "color": color}

        def button(name, pos, size, text, font_size, text_color, bg_color, arg1=None, arg2=None):
            x, y = pos
            w, h = size
            border_color, action = None, None
            if arg2 is not None: border_color, action = arg1, arg2
            elif arg1 is not None:
                if isinstance(arg1, set) or callable(arg1): action = arg1
                else: border_color = arg1
            if isinstance(action, set): action = list(action)[0]
            elements[name] = {
                "type": "button", "x": x, "y": y, "w": w, "h": h, "text": text,
                "font_size": font_size, "text_color": text_color, "bg_color": bg_color,
                "border_color": border_color, "action": action
            }

        def circle(name, pos, r, color):
            elements[name] = {"type": "circle", "x": pos[0], "y": pos[1], "r": r, "color": color}

        def rect(name, pos, size, color, border_color=None):
            elements[name] = {"type": "rect", "x": pos[0], "y": pos[1], "w": size[0], "h": size[1], "color": color, "border_color": border_color}

        def line(name, pos1, pos2, size, color):
            elements[name] = {"type": "line", "x": pos1[0], "y": pos1[1], "x2": pos2[0], "y2": pos2[1], "size": size, "color": color}

        def text_change(name, new_text):
            if name in elements and "text" in elements[name]: elements[name]["text"] = new_text

        def color_change(name, new_color):
            if name in elements:
                if "color" in elements[name]: elements[name]["color"] = new_color
                if "bg_color" in elements[name]: elements[name]["bg_color"] = new_color

        def size_change(name, new_size):
            if name in elements:
                if "size" in elements[name]: elements[name]["size"] = new_size
                if "font_size" in elements[name]: elements[name]["font_size"] = new_size
                if "r" in elements[name]: elements[name]["r"] = new_size

        def get_x(name): return elements[name]["x"]
        def get_y(name): return elements[name]["y"]
        def stop_move(name):
            if name in animations: del animations[name]

        def touch(name1, name2):
            if name1 not in elements or name2 not in elements: return False
            def get_box(el):
                if el["type"] in ["button", "rect"]: return el["x"], el["y"], el["w"], el["h"]
                elif el["type"] == "circle": return el["x"] - el["r"], el["y"] - el["r"], el["r"] * 2, el["r"] * 2
                elif el["type"] == "text": return el["x"], el["y"], el["size"] * len(str(el["text"])) * 0.6, el["size"]
                elif el["type"] == "line": return min(el["x"], el["x2"]), min(el["y"], el["y2"]), abs(el["x"] - el["x2"]), abs(el["y"] - el["y2"])
                return 0, 0, 0, 0
            x1, y1, w1, h1 = get_box(elements[name1])
            x2, y2, w2, h2 = get_box(elements[name2])
            return x1 < x2 + w2 and x2 < x1 + w1 and y1 < y2 + h2 and y2 < y1 + h1

        def erase(name):
            if name in elements: del elements[name]
            if name in animations: del animations[name]

        def move(name, path, repeat_count):
            if name not in elements: return
            start_pos, end_pos, duration = path
            animations[name] = {
                "start": start_pos, "end": end_pos, "duration": duration,
                "elapsed": 0.0, "repeat_total": repeat_count, "repeat_current": 0
            }

        def custom_random(a, b): return random.randint(a, b)

        async def wait(seconds, func=None):
            if isinstance(func, set): func = list(func)[0]
            start_time = time.time()
            while time.time() - start_time < seconds:
                if has_error: break
                if callable(func):
                    await safe_call(func)
                await asyncio.sleep(0.016)

        class AudioController:
            def play(self, url):
                try:
                    a = Audio.new(url)
                    a.play()
                except Exception: pass

        # ★キーボード入力判定
        @when("keydown", "#canvas-wrapper")
        def on_keydown(event):
            if not is_screen_ready or has_error: return
            
            k_code = getattr(event, "code", "")
            k_key = getattr(event, "key", "").upper()
            
            mapped_key = None
            if k_code.startswith("Numpad"):
                mapped_key = "TEN" + k_code.replace("NUMPAD", "").upper()
            else:
                key_map = {"ARROWUP": "UP", "ARROWDOWN": "DOWN", "ARROWLEFT": "LEFT", "ARROWRIGHT": "RIGHT", " ": "SPACE", "ESCAPE": "ESC"}
                mapped_key = key_map.get(k_key, k_key)
                
            if mapped_key in key_events:
                if mapped_key in ["UP", "DOWN", "LEFT", "RIGHT", "SPACE"]: event.preventDefault()
                # ★エラーを確実にキャッチする
                asyncio.ensure_future(safe_call(key_events[mapped_key]))

        @when("click", "#game-canvas")
        def on_canvas_click(event):
            if not is_screen_ready or has_error: return
            rect = canvas.getBoundingClientRect()
            click_x = event.clientX - rect.left
            click_y = event.clientY - rect.top
            for name, el in reversed(list(elements.items())):
                if el["type"] == "button":
                    if el["x"] <= click_x <= el["x"] + el["w"] and el["y"] <= click_y <= el["y"] + el["h"]:
                        action = el.get("action")
                        if callable(action):
                            asyncio.ensure_future(safe_call(action))
                        break

        # ★エラー解析の超進化（本当の原因も教えます）
        def show_japanese_error():
            global has_error
            has_error = True
            error_el.style.display = "block"
            
            exc_type, exc_value, exc_tb = sys.exc_info()
            err_str = traceback.format_exc()
            
            error_line = "不明"
            if isinstance(exc_value, SyntaxError) and exc_value.lineno is not None:
                error_line = str(exc_value.lineno)
            else:
                tb_list = traceback.extract_tb(exc_tb)
                for tb in reversed(tb_list):
                    if '<string>' in tb.filename or '<exec>' in tb.filename:
                        error_line = str(tb.lineno)
                        break

            msg = f"🚨 エラーが発生しました（ {error_line}行目 付近）:\n"
            
            if "KeyError" in err_str: msg += "要素見つからないエラー: get_xなどで指定した「名前」の図形や文字が存在しません。スペルミスや、作成前に取得しようとしていないか確認してください。"
            elif "outside function" in err_str or "outside async function" in err_str: msg += "関数エラー: wait() は fun の中か、key() の中でしか使えません。"
            elif "was never closed" in err_str or "unexpected EOF" in err_str or "unclosed string" in err_str: msg += "閉じ忘れエラー: カッコ「()」「[]」や、文字を囲む「\"」が閉じていません。"
            elif "NameError" in err_str: msg += "名前エラー: 文字や名前を「\" \"」で囲み忘れていませんか？"
            elif "SyntaxError" in err_str: msg += "文法エラー: カッコ「()」や「:」の忘れがないか、全角スペースが混ざっていないか確認してください。"
            elif "IndentationError" in err_str: msg += "インデントエラー: keyやfunの下は、半角スペース4つで字下げしてください。"
            elif "TypeError" in err_str: msg += "引数エラー: カッコの中のカンマ「,」の数や情報が間違っています。"
            else: msg += "エラーを検出しました。"
            
            # 本当のエラーメッセージも表示してデバッグしやすくする
            msg += f"\n\n[システム詳細]\n{str(exc_value)}"
            error_el.innerText = msg

        original_language_globals = {
            "screen": screen, "screen_color": screen_color, "print": custom_print, "button": button, 
            "circle": circle, "rect": rect, "line": line, "text_change": text_change, "color_change": color_change,
            "size_change": size_change, "get_x": get_x, "get_y": get_y, "touch": touch, "stop_move": stop_move,
            "erase": erase, "move": move, "random": custom_random, "wait": wait, "infinite": infinite,
            "RED": RED, "YELLOW": YELLOW, "BLUE": BLUE, "GREEN": GREEN, "BLACK": BLACK, "WHITE": WHITE,
            "audio": AudioController()
        }

        async def game_loop(run_id):
            last_time = time.time()
            while run_id == current_run_id and not has_error:
                if not is_screen_ready:
                    await asyncio.sleep(0.016)
                    continue
                current_time = time.time()
                dt = current_time - last_time
                last_time = current_time
                
                ctx.fillStyle = bg_color_canvas
                ctx.fillRect(0, 0, canvas.width, canvas.height)
                
                for name in list(animations.keys()):
                    anim = animations[name]
                    anim["elapsed"] += dt
                    progress = anim["elapsed"] / anim["duration"]
                    if progress >= 1.0:
                        if anim["repeat_total"] == infinite or anim["repeat_current"] < anim["repeat_total"] - 1:
                            anim["elapsed"] = 0.0
                            anim["repeat_current"] += 1
                            progress = 0.0
                        else:
                            progress = 1.0
                            del animations[name]
                    if name in elements:
                        sx, sy = anim["start"]
                        ex, ey = anim["end"]
                        elements[name]["x"] = sx + (ex - sx) * progress
                        elements[name]["y"] = sy + (ey - sy) * progress
                        
                for name, el in elements.items():
                    if el["type"] == "text":
                        ctx.fillStyle = el["color"]
                        ctx.font = f"bold {el['size']}px sans-serif"
                        ctx.fillText(str(el["text"]), el["x"], el["y"] + el["size"])
                    elif el["type"] == "circle":
                        ctx.beginPath()
                        ctx.arc(el["x"], el["y"], el["r"], 0, 2 * 3.14159)
                        ctx.fillStyle = el["color"]
                        ctx.fill()
                    elif el["type"] == "rect":
                        ctx.fillStyle = el["color"]
                        ctx.fillRect(el["x"], el["y"], el["w"], el["h"])
                        if el["border_color"]:
                            ctx.strokeStyle = el["border_color"]
                            ctx.lineWidth = 2
                            ctx.strokeRect(el["x"], el["y"], el["w"], el["h"])
                    elif el["type"] == "line":
                        ctx.beginPath()
                        ctx.moveTo(el["x"], el["y"])
                        ctx.lineTo(el["x2"], el["y2"])
                        ctx.lineWidth = el["size"]
                        ctx.strokeStyle = el["color"]
                        ctx.stroke()
                    elif el["type"] == "button":
                        ctx.fillStyle = el["bg_color"]
                        ctx.fillRect(el["x"], el["y"], el["w"], el["h"])
                        if el["border_color"]:
                            ctx.strokeStyle = el["border_color"]
                            ctx.lineWidth = 4
                            ctx.strokeRect(el["x"], el["y"], el["w"], el["h"])
                        ctx.fillStyle = el["text_color"]
                        ctx.font = f"bold {el['font_size']}px sans-serif"
                        ctx.textAlign = "center"
                        ctx.textBaseline = "middle"
                        ctx.fillText(str(el["text"]), el["x"] + el["w"]/2, el["y"] + el["h"]/2)
                        ctx.textAlign = "left"
                        ctx.textBaseline = "alphabetic"
                await asyncio.sleep(0.016)

        def run_code(event):
            asyncio.ensure_future(run_code_async())

        async def run_code_async():
            global current_run_id, is_screen_ready, bg_color_canvas, has_error
            current_run_id += 1
            is_screen_ready = False
            has_error = False
            bg_color_canvas = "white"
            
            elements.clear()
            animations.clear()
            key_events.clear()
            ctx.clearRect(0, 0, canvas.width, canvas.height)
            canvas.width, canvas.height = 0, 0
            error_el.style.display = "none"
            
            code = window.getWrappedCode()
            run_globals = original_language_globals.copy()
            
            try:
                await eval_code_async(code, globals=run_globals)
                
                # キーイベントの自動登録
                for name, obj in list(run_globals.items()):
                    if name.startswith("__key_K_") and callable(obj):
                        k_name = name.replace("__key_K_", "").upper()
                        key_events[k_name] = obj
                        
                asyncio.ensure_future(game_loop(current_run_id))
                
                # ★実行ボタンを押した瞬間にゲーム画面をオレンジ色にして操作可能にする！
                document.getElementById("canvas-wrapper").focus()
            except Exception:
                show_japanese_error()

        document.getElementById("btn-run").onclick = run_code
    </script>
</body>
